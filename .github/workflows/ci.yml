name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
        env:
          # The engine-snapshot suite (kemton/zentek/maetrim/yings) loads
          # the full game data inside one fork; raise the heap to avoid
          # the runner's default cap.
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build
        run: npm run build

      - name: Docker build smoke test
        run: docker build -t ddo-builds-ci-test .
