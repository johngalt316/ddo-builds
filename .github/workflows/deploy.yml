name: Deploy to AWS App Runner

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ddo-builds

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC auth to AWS
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and test
        run: npm ci && npm run typecheck && npm run test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Create this IAM role once and add the GitHub OIDC trust policy.
          # Replace <ACCOUNT_ID> with your 12-digit AWS account ID.
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/github-actions-ddo-builds
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Trigger App Runner deployment
        env:
          # Replace <SERVICE_ID> with your App Runner service ID (from AWS console).
          APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:${{ env.AWS_REGION }}:<ACCOUNT_ID>:service/ddo-builds/<SERVICE_ID>
        run: |
          aws apprunner start-deployment --service-arn $APP_RUNNER_SERVICE_ARN
